# ----------------------------
# Prefix: Ctrl+a (easier than Ctrl+b)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ----------------------------
# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on

# ----------------------------
# Splits: | and - (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ----------------------------
# No-prefix shortcuts (Alt+key)
bind -n M-Left select-pane -L         # Alt+←  switch pane
bind -n M-Right select-pane -R        # Alt+→
bind -n M-Up select-pane -U           # Alt+↑
bind -n M-Down select-pane -D         # Alt+↓

bind -n M-\\ split-window -h -c "#{pane_current_path}"   # Alt+\  split right
bind -n M-- split-window -v -c "#{pane_current_path}"     # Alt+-  split down
bind -n M-w kill-pane                                      # Alt+w  close pane
bind -n M-z resize-pane -Z                                 # Alt+z  zoom toggle
bind -n M-t new-window -c "#{pane_current_path}"           # Alt+t  new window
bind -n M-q kill-window                                    # Alt+q  close window
bind -n M-1 select-window -t 1        # Alt+1-5 jump to window
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-n next-window                # Alt+n  next window
bind -n M-p previous-window            # Alt+p  prev window

# Resize: Ctrl+arrow (still needs prefix)
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 3
bind -r C-Down resize-pane -D 3

# ----------------------------
# Quick reload
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ----------------------------
# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[fg=colour232,bg=colour39,bold] #S #[fg=colour39,bg=colour235] "
set -g status-right "#[fg=colour248] %H:%M #[fg=colour232,bg=colour39,bold] #h "

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour232,bg=colour39,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
